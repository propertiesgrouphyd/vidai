name: Generate VIDHWAAN Topics


on:

  push:

    paths:

      - "data/categories.js"

  workflow_dispatch:




permissions:

  contents: write




jobs:


  generate-topics:


    runs-on: ubuntu-latest



    steps:


      - name: Checkout repository

        uses: actions/checkout@v4




      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: 24





      - name: Generate Topics

        env:

          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

        run: |

          node scripts/generate-topics.js





      - name: Commit generated topics

        run: |


          git config user.name "VIDHWAAN AI"

          git config user.email "ai@vidhwaan.com"


          git add data/topics.js


          git commit -m "Auto generate AI topics" || echo "No changes"


          git push
