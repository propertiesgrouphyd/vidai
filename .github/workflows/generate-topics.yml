name: Generate VIDHWAAN AI Topics


on:

  workflow_dispatch:


  schedule:

    - cron: "0 2 * * *"



permissions:

  contents: write



jobs:


  generate-topics:


    runs-on: ubuntu-latest


    timeout-minutes: 360



    steps:



      - name: Checkout Repository

        uses: actions/checkout@v4

        with:

          fetch-depth: 0





      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: 22





      - name: Check Node Version

        run: |

          node --version

          npm --version





      - name: Generate Topics

        env:

          GROQ_API_KEY:
            ${{ secrets.GROQ_API_KEY }}

        run: |

          node scripts/generate-topics.js





      - name: Validate Topics

        run: |

          node scripts/generate-topics.js --validate





      - name: Commit Generated Files

        run: |


          git config user.name "github-actions[bot]"

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"


          git add generated/topics.js

          git add generated/topics-progress.json


          git diff --cached --quiet || git commit -m "Auto generate AI topics"





      - name: Push Changes

        run: |

          git push
