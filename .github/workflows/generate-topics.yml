name: Generate VIDHWAAN AI Topics


on:

  workflow_dispatch:




permissions:

  contents: write



jobs:

  generate-topics:


    name: Generate Topics Using Groq


    runs-on: ubuntu-latest


    timeout-minutes: 360



    steps:



      - name: Checkout Repository

        uses: actions/checkout@v4

        with:

          fetch-depth: 0





      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: 22

          cache: npm





      - name: Install Dependencies

        run: |

          npm ci





      - name: Generate Topics

        env:

          GROQ_API_KEY:
            ${{ secrets.GROQ_API_KEY }}

        run: |

          node scripts/generate-topics.js





      - name: Validate Generated Topics

        run: |

          node scripts/generate-topics.js --validate





      - name: Show Generation Status

        run: |

          echo "Generated topic files:"

          ls -lh generated/

          echo ""

          echo "Topic count:"

          node -e "

          const fs=require('fs');

          const text=fs.readFileSync(
          'generated/topics-progress.json',
          'utf8'
          );

          console.log(
          JSON.parse(text).length
          );

          "





      - name: Commit Generated Topics


        run: |


          git config user.name "github-actions[bot]"

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"



          git add generated/topics.js

          git add generated/topics-progress.json



          git diff --cached --quiet || git commit -m "Auto update AI topics"



      - name: Push Changes


        run: |


          git push
